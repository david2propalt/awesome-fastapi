name: CI

on: [push]

jobs:
  approval:
    runs-on: ubuntu-latest
    environment: manual-approval
    steps:
      - name: Approved
        run: echo "Approved"

  test:
    needs: approval
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: awesome_fastapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+psycopg2://app:app@127.0.0.1:5432/awesome_fastapi
      TEST_DATABASE_URL: postgresql+psycopg2://app:app@127.0.0.1:5432/awesome_fastapi_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Bootstrap test database
        run: |
          psql postgresql://app:app@127.0.0.1:5432/awesome_fastapi \
            -c "CREATE DATABASE awesome_fastapi_test;"

      - name: Run ruff
        run: uv run ruff check .

      - name: Run pytest
        run: uv run pytest
